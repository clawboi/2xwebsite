<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>404 — 2X / AOCD</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000;
      color: #F2F2F2;
      font-family: 'Space Mono', ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 600px; }
    .code {
      color: #00FF33;
      font-size: 13px;
      letter-spacing: 0.25em;
      margin-bottom: 24px;
    }
    .glitch {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(80px, 18vw, 180px);
      color: #BD0906;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 24px;
      text-shadow:
        2px 0 #00FF33,
        -2px 0 #F2F2F2;
    }
    .msg {
      font-size: 14px;
      color: #707070;
      margin-bottom: 36px;
      letter-spacing: 0.1em;
    }
    .msg b { color: #F2F2F2; font-weight: 700; }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      border: 2px solid #BD0906;
      color: #BD0906;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-decoration: none;
      transition: all .12s ease;
    }
    .back:hover {
      background: #BD0906;
      color: #F2F2F2;
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #00FF33;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #BD0906;
      animation: blink 1.2s steps(2) infinite;
    }
    @keyframes blink { 50% { opacity: 0.2; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code"><span class="dot"></span> &nbsp; SYS / ERR / 0x404</div>
    <div class="glitch">404</div>
    <div class="msg"><b>TRACK NOT FOUND.</b> &nbsp;//&nbsp; that page doesn't exist or hasn't dropped yet.</div>
    <a class="back" href="/">← RETURN TO AOCD</a>
  </div>
</body>
</html>
